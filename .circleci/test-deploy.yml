version: 2.1

orbs:
  orb-tools: circleci/orb-tools@12.3
  vexcalibur: {}

filters: &filters
  tags:
    only: /.*/

release-filters: &release-filters
  branches:
    ignore: /.*/
  tags:
    only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

dev-publish-filters: &dev-publish-filters
  branches:
    only: main
  tags:
    ignore: /.*/

jobs:
  command-help-test:
    docker:
      - image: cimg/python:3.14.1
    steps:
      - vexcalibur/run_vexcalibur:
          args: --help

  format-output-test:
    docker:
      - image: cimg/python:3.14.1
    steps:
      - checkout
      - run:
          name: Prepare artifact directory
          command: mkdir -p artifacts/acceptance
      - vexcalibur/run_vexcalibur:
          args: |
            generate
            tests/fixtures/cyclonedx-sbom.json
            --offline
            --findings-file
            tests/fixtures/local-findings.json
            --format
            cyclonedx
            --timestamp
            2099-01-01T00:00:00Z
            --output
            artifacts/acceptance/cyclonedx.json
      - vexcalibur/run_vexcalibur:
          args: |
            generate
            tests/fixtures/cyclonedx-sbom.json
            --offline
            --findings-file
            tests/fixtures/local-findings.json
            --format
            openvex
            --author
            Vexcalibur orb acceptance test
            --author-role
            VEX document producer
            --timestamp
            2099-01-01T00:00:00Z
            --output
            artifacts/acceptance/openvex.json
      - run:
          name: Validate generated formats
          command: |
            python - \<<'PY'
            import json
            from pathlib import Path

            artifact_dir = Path("artifacts/acceptance")
            cyclonedx = json.loads((artifact_dir / "cyclonedx.json").read_text())
            openvex = json.loads((artifact_dir / "openvex.json").read_text())

            assert cyclonedx["bomFormat"] == "CycloneDX"
            assert cyclonedx["specVersion"] == "1.6"
            assert [item["id"] for item in cyclonedx["vulnerabilities"]] == [
                "CVE-2099-0001"
            ]

            assert openvex["@context"] == "https://openvex.dev/ns/v0.2.0"
            assert openvex["author"] == "Vexcalibur orb acceptance test"
            assert len(openvex["statements"]) == 1
            statement = openvex["statements"][0]
            assert statement["status"] == "under_investigation"
            assert statement["vulnerability"]["name"] == "CVE-2099-0001"
            assert [product["@id"] for product in statement["products"]] == [
                "pkg:pypi/example-library@1.2.3"
            ]
            PY
      - store_artifacts:
          path: artifacts/acceptance

  release-source-check:
    docker:
      - image: cimg/base:2026.01
    steps:
      - checkout
      - run:
          name: Confirm release tag is on main
          command: |
            set -euo pipefail
            git fetch --no-tags origin main
            git merge-base --is-ancestor "$CIRCLE_SHA1" origin/main

workflows:
  test-deploy:
    jobs:
      - command-help-test:
          filters: *filters
      - format-output-test:
          filters: *filters
      - vexcalibur/run:
          name: job-help-test
          checkout: false
          args: --help
          filters: *filters
      - orb-tools/pack:
          name: pack-dev
          filters: *dev-publish-filters
      - approve-dev-publish:
          type: approval
          requires:
            - pack-dev
            - command-help-test
            - format-output-test
            - job-help-test
          filters: *dev-publish-filters
      - orb-tools/publish:
          name: publish-dev
          orb_name: vexcalibur-dev/vexcalibur
          vcs_type: github
          pub_type: dev
          context: orb-publishing
          requires:
            - approve-dev-publish
          filters: *dev-publish-filters
      - orb-tools/pack:
          name: pack-release
          filters: *release-filters
      - release-source-check:
          filters: *release-filters
      - orb-tools/publish:
          name: publish-release
          orb_name: vexcalibur-dev/vexcalibur
          vcs_type: github
          pub_type: production
          context: orb-publishing
          requires:
            - pack-release
            - command-help-test
            - format-output-test
            - job-help-test
            - release-source-check
          filters: *release-filters
