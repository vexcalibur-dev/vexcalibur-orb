version: 2.1

orbs:
  orb-tools: circleci/orb-tools@12.3.3
  vexcalibur: {}

executors:
  pinned-circleci-cli:
    docker:
      - image: circleci/circleci-cli:0.1.38646@sha256:2a2081377367e051fb247752ac17f753f7675f5d36e334c24da73034848f0926

commands:
  record-packed-orb:
    steps:
      - run:
          name: Record packed orb SHA-256
          command: |
            set -euo pipefail
            orb_path=dist/orb.yml
            checksum_path=dist/orb.yml.sha256

            if [[ ! -f "$orb_path" || -L "$orb_path" ]]; then
              printf 'Packed orb must be a regular, non-symlink file: %s\n' "$orb_path" >&2
              exit 1
            fi

            read -r digest _ < <(sha256sum -- "$orb_path")
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              printf 'sha256sum returned an invalid digest for %s\n' "$orb_path" >&2
              exit 1
            fi

            temporary_checksum="${checksum_path}.tmp.$$"
            cleanup() {
              rm -f -- "$temporary_checksum"
            }
            trap cleanup EXIT
            printf '%s  orb.yml\n' "$digest" > "$temporary_checksum"
            mv -f -- "$temporary_checksum" "$checksum_path"
            trap - EXIT

            printf 'Recorded SHA-256 for %s: %s\n' "$orb_path" "$digest"

  verify-packed-orb:
    steps:
      - run:
          name: Verify packed orb SHA-256
          command: |
            set -euo pipefail
            orb_path=dist/orb.yml
            checksum_path=dist/orb.yml.sha256

            if [[ ! -f "$orb_path" || -L "$orb_path" ]]; then
              printf 'Packed orb must be a regular, non-symlink file: %s\n' "$orb_path" >&2
              exit 1
            fi
            if [[ ! -f "$checksum_path" || -L "$checksum_path" ]]; then
              printf 'Checksum must be a regular, non-symlink file: %s\n' "$checksum_path" >&2
              exit 1
            fi

            mapfile -t checksum_lines < "$checksum_path"
            if (( ${#checksum_lines[@]} != 1 )); then
              printf 'Checksum manifest must contain exactly one line: %s\n' "$checksum_path" >&2
              exit 1
            fi

            checksum_line="${checksum_lines[0]}"
            expected_digest="${checksum_line:0:64}"
            separator="${checksum_line:64:2}"
            recorded_name="${checksum_line:66}"
            if [[ ! "$expected_digest" =~ ^[0-9a-f]{64}$ \
              || "$separator" != "  " \
              || "$recorded_name" != "orb.yml" ]]; then
              printf 'Checksum manifest has an invalid entry for orb.yml\n' >&2
              exit 1
            fi

            read -r actual_digest _ < <(sha256sum -- "$orb_path")
            if [[ "$actual_digest" != "$expected_digest" ]]; then
              printf 'Packed orb SHA-256 does not match the credentialless pack result\n' >&2
              printf 'Expected: %s\nActual:   %s\n' "$expected_digest" "$actual_digest" >&2
              exit 1
            fi

            printf 'Verified SHA-256 for %s: %s\n' "$orb_path" "$actual_digest"

filters: &filters
  tags:
    only: /.*/

release-filters: &release-filters
  branches:
    ignore: /.*/
  tags:
    only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

dev-publish-filters: &dev-publish-filters
  branches:
    only: main
  tags:
    ignore: /.*/

jobs:
  command-help-test:
    docker:
      - image: cimg/python:3.14.1
    steps:
      - vexcalibur/run_vexcalibur:
          args: --help

  format-output-test:
    docker:
      - image: cimg/python:3.14.1
    steps:
      - checkout
      - run:
          name: Prepare artifact directory
          command: mkdir -p artifacts/acceptance
      - vexcalibur/run_vexcalibur:
          args: |
            generate
            tests/fixtures/cyclonedx-sbom.json
            --offline
            --findings-file
            tests/fixtures/local-findings.json
            --format
            cyclonedx
            --timestamp
            2099-01-01T00:00:00Z
            --output
            artifacts/acceptance/cyclonedx.json
      - vexcalibur/run_vexcalibur:
          args: |
            generate
            tests/fixtures/cyclonedx-sbom.json
            --offline
            --findings-file
            tests/fixtures/local-findings.json
            --format
            openvex
            --author
            Vexcalibur orb acceptance test
            --author-role
            VEX document producer
            --timestamp
            2099-01-01T00:00:00Z
            --output
            artifacts/acceptance/openvex.json
      - vexcalibur/run_vexcalibur:
          args: |
            generate
            tests/fixtures/cyclonedx-sbom.json
            --offline
            --findings-file
            tests/fixtures/local-findings.json
            --format
            csaf
            --csaf-version
            2.0
            --csaf-document-id
            VEXCALIBUR-ORB-ACCEPTANCE
            --csaf-document-title
            Vexcalibur orb acceptance test
            --csaf-publisher-name
            Vexcalibur Product Security
            --csaf-publisher-namespace
            https://github.com/vexcalibur-dev
            --csaf-publisher-category
            vendor
            --csaf-document-status
            final
            --timestamp
            2099-01-01T00:00:00Z
            --output
            artifacts/acceptance/vexcalibur-orb-acceptance.json
      - run:
          name: Validate generated formats
          command: |
            python - \<<'PY'
            import json
            from pathlib import Path

            artifact_dir = Path("artifacts/acceptance")
            cyclonedx = json.loads((artifact_dir / "cyclonedx.json").read_text())
            openvex = json.loads((artifact_dir / "openvex.json").read_text())
            csaf = json.loads(
                (artifact_dir / "vexcalibur-orb-acceptance.json").read_text()
            )

            assert cyclonedx["bomFormat"] == "CycloneDX"
            assert cyclonedx["specVersion"] == "1.6"
            assert [item["id"] for item in cyclonedx["vulnerabilities"]] == [
                "CVE-2099-0001"
            ]

            assert openvex["@context"] == "https://openvex.dev/ns/v0.2.0"
            assert openvex["author"] == "Vexcalibur orb acceptance test"
            assert len(openvex["statements"]) == 1
            statement = openvex["statements"][0]
            assert statement["status"] == "under_investigation"
            assert statement["vulnerability"]["name"] == "CVE-2099-0001"
            assert [product["@id"] for product in statement["products"]] == [
                "pkg:pypi/example-library@1.2.3"
            ]

            assert "$schema" not in csaf
            csaf_document = csaf["document"]
            assert csaf_document["category"] == "csaf_vex"
            assert csaf_document["csaf_version"] == "2.0"
            assert csaf_document["publisher"] == {
                "category": "vendor",
                "name": "Vexcalibur Product Security",
                "namespace": "https://github.com/vexcalibur-dev",
            }
            assert csaf_document["title"] == "Vexcalibur orb acceptance test"
            tracking = csaf_document["tracking"]
            assert tracking["id"] == "VEXCALIBUR-ORB-ACCEPTANCE"
            assert tracking["status"] == "final"
            assert tracking["version"] == "1"
            assert tracking["initial_release_date"] == "2099-01-01T00:00:00Z"
            assert tracking["current_release_date"] == "2099-01-01T00:00:00Z"
            assert tracking["revision_history"] == [
                {
                    "date": "2099-01-01T00:00:00Z",
                    "number": "1",
                    "summary": "Initial version.",
                }
            ]
            assert tracking["generator"] == {
                "date": "2099-01-01T00:00:00Z",
                "engine": {"name": "Vexcalibur", "version": "0.3.1"},
            }
            products = csaf["product_tree"]["full_product_names"]
            assert len(products) == 1
            assert products[0]["product_identification_helper"]["purl"] == (
                "pkg:pypi/example-library@1.2.3"
            )
            vulnerability = csaf["vulnerabilities"][0]
            assert vulnerability["cve"] == "CVE-2099-0001"
            assert vulnerability["product_status"] == {
                "under_investigation": [products[0]["product_id"]]
            }
            assert "Original Vexcalibur analysis state: in_triage" in (
                vulnerability["notes"][0]["text"]
            )
            PY
      - store_artifacts:
          path: artifacts/acceptance

  release-source-check:
    docker:
      - image: cimg/base:2026.01
    steps:
      - checkout
      - run:
          name: Confirm release tag is on main
          command: |
            set -euo pipefail
            git fetch --no-tags origin main
            git merge-base --is-ancestor "$CIRCLE_SHA1" origin/main

workflows:
  test-deploy:
    jobs:
      - command-help-test:
          filters: *filters
      - format-output-test:
          filters: *filters
      - vexcalibur/run:
          name: job-help-test
          checkout: false
          args: --help
          filters: *filters
      - orb-tools/pack:
          name: pack-dev
          executor: pinned-circleci-cli
          persist_to_workspace: false
          post-steps:
            - record-packed-orb
            - store_artifacts:
                path: dist/orb.yml.sha256
                destination: packed-orb/orb.yml.sha256
            - persist_to_workspace:
                root: dist
                paths:
                  - orb.yml
                  - orb.yml.sha256
          filters: *dev-publish-filters
      - approve-dev-publish:
          type: approval
          requires:
            - pack-dev
            - command-help-test
            - format-output-test
            - job-help-test
          filters: *dev-publish-filters
      - orb-tools/publish:
          name: publish-dev
          executor: pinned-circleci-cli
          attach_workspace: false
          orb_name: vexcalibur-dev/vexcalibur
          vcs_type: github
          pub_type: dev
          enable_pr_comment: false
          context: orb-publishing
          pre-steps:
            - attach_workspace:
                at: dist
            - verify-packed-orb
          requires:
            - approve-dev-publish
          filters: *dev-publish-filters
      - orb-tools/pack:
          name: pack-release
          executor: pinned-circleci-cli
          persist_to_workspace: false
          post-steps:
            - record-packed-orb
            - store_artifacts:
                path: dist/orb.yml.sha256
                destination: packed-orb/orb.yml.sha256
            - persist_to_workspace:
                root: dist
                paths:
                  - orb.yml
                  - orb.yml.sha256
          filters: *release-filters
      - release-source-check:
          filters: *release-filters
      - orb-tools/publish:
          name: publish-release
          executor: pinned-circleci-cli
          attach_workspace: false
          orb_name: vexcalibur-dev/vexcalibur
          vcs_type: github
          pub_type: production
          enable_pr_comment: false
          context: orb-publishing
          pre-steps:
            - attach_workspace:
                at: dist
            - verify-packed-orb
          requires:
            - pack-release
            - command-help-test
            - format-output-test
            - job-help-test
            - release-source-check
          filters: *release-filters
