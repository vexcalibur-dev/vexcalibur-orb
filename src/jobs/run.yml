---
description: >-
  Optionally check out the project, then run Vexcalibur in the Python executor.

executor:
  name: python
  tag: << parameters.python_version >>

parameters:
  python_version:
    type: string
    # yamllint disable rule:line-length
    default: "3.14.5@sha256:724637b8722b6f7f7199dfae94ba95bbd2cd14978a99d02ae6bd5c7b12c44805"  # pragma: allowlist secret
    # yamllint enable rule:line-length
    description: >-
      Tag for the cimg/python Docker image used by the Python executor.
  checkout:
    type: boolean
    default: true
    description: Check out the project before running Vexcalibur.
  package_spec:
    type: string
    default: vexcalibur==0.3.1
    description: Package requirement passed to the run_vexcalibur command.
  allow_development_package_spec:
    type: boolean
    default: false
    description: >-
      Allow a non-release package requirement. Use this only with a trusted
      source in development workflows.
  constraints_file:
    type: string
    default: ""
    description: >-
      Readable absolute path to a pip constraints file. Empty applies no
      constraints.
  args:
    type: string
    default: --help
    description: >-
      Arguments for the Vexcalibur CLI. Each nonempty line becomes one literal
      argument.

steps:
  - when:
      condition: << parameters.checkout >>
      steps:
        - checkout
  - run_vexcalibur:
      package_spec: << parameters.package_spec >>
      allow_development_package_spec: >-
        << parameters.allow_development_package_spec >>
      constraints_file: << parameters.constraints_file >>
      args: << parameters.args >>
