description: Run Vexcalibur in a Python executor.

executor:
  name: python
  tag: << parameters.python_version >>

parameters:
  python_version:
    type: string
    default: "3.14"
    description: Tag for the cimg/python Docker image.
  checkout:
    type: boolean
    default: true
    description: Whether to checkout the project before running Vexcalibur.
  package_spec:
    type: string
    default: vexcalibur==0.1.1
    description: Exact Vexcalibur package spec passed to pip install.
  allow_development_package_spec:
    type: boolean
    default: false
    description: Allow non-release package specs such as Git URLs. Use only for development workflows.
  constraints_file:
    type: string
    default: ""
    description: Absolute path to a pip constraints file applied to the isolated install.
  args:
    type: string
    default: --help
    description: Newline-separated arguments passed to the installed vexcalibur executable.

steps:
  - when:
      condition: << parameters.checkout >>
      steps:
        - checkout
  - run_vexcalibur:
      package_spec: << parameters.package_spec >>
      allow_development_package_spec: << parameters.allow_development_package_spec >>
      constraints_file: << parameters.constraints_file >>
      args: << parameters.args >>
