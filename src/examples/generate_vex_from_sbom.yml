description: Generate deterministic CycloneDX VEX and store it as an artifact. The caller must provide the SBOM and findings paths shown.

usage:
  version: 2.1

  orbs:
    vexcalibur: vexcalibur-dev/vexcalibur@0.1.0

  jobs:
    generate-vex:
      executor: vexcalibur/python
      steps:
        - checkout
        - run:
            name: Prepare artifact directory
            command: mkdir -p artifacts
        - vexcalibur/run_vexcalibur:
            args: |
              generate
              sbom/cyclonedx.xml
              --offline
              --findings-file
              security/vexcalibur-findings.json
              --timestamp
              2026-06-23T00:00:00Z
              --output
              artifacts/cyclonedx-vex.json
        - store_artifacts:
            path: artifacts/cyclonedx-vex.json

  workflows:
    generate-vex:
      jobs:
        - generate-vex
