description: Install Vexcalibur in a temporary virtual environment and run its CLI.

parameters:
  package_spec:
    type: string
    default: vexcalibur==0.1.1
    description: Package requirement passed to pip. The default policy requires an exact stable Vexcalibur release.
  allow_development_package_spec:
    type: boolean
    default: false
    description: Allow a non-release package requirement. Use this only with a trusted source in development workflows.
  constraints_file:
    type: string
    default: ""
    description: Readable absolute path to a pip constraints file. Empty applies no constraints.
  args:
    type: string
    default: --help
    description: Arguments for the Vexcalibur CLI. Each nonempty line becomes one literal argument.

steps:
  - run:
      name: Run Vexcalibur
      environment:
        VEXCALIBUR_ORB_PACKAGE_SPEC: << parameters.package_spec >>
        VEXCALIBUR_ORB_ALLOW_DEVELOPMENT_PACKAGE_SPEC: << parameters.allow_development_package_spec >>
        VEXCALIBUR_ORB_CONSTRAINTS_FILE: << parameters.constraints_file >>
        VEXCALIBUR_ORB_ARGS: << parameters.args >>
      command: <<include(scripts/run-vexcalibur.sh)>>
